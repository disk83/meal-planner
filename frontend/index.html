<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planificador de comidas</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 30px; border-bottom: 2px solid #ddd; }
    .tab { padding: 10px 24px; cursor: pointer; font-size: 15px; border: none; background: none; color: #888; }
    .tab.active { color: #222; border-bottom: 2px solid #222; margin-bottom: -2px; font-weight: bold; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Meal plan */
    button { padding: 10px 20px; font-size: 15px; cursor: pointer; margin-top: 10px; }
    .day { padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 4px; }
    .day-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .day-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .day-action-btn { margin-top: 0; padding: 6px 12px; font-size: 13px; }
    .day-manual-row { display: none; margin-top: 8px; gap: 8px; align-items: center; flex-wrap: wrap; }
    .day-manual-row.visible { display: flex; }
    .day-manual-row select { min-width: 220px; padding: 6px; }
    .week-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .week-nav button { margin-top: 0; padding: 8px 14px; font-size: 14px; }
    #selected-week-label { font-weight: bold; }
    #week-state { margin: 0 0 12px 0; color: #444; }
    #meal-plan-empty { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 4px; color: #444; }
    #error { color: red; margin-top: 20px; }
    #loading { margin-top: 20px; color: #666; }

    /* Recipe list */
    .recipe-card { border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
    .recipe-name-btn { width: 100%; text-align: left; background: #fff; border: none; padding: 12px 14px; margin: 0; font-size: 15px; font-weight: bold; cursor: pointer; }
    .recipe-name-btn:hover { background: #fafafa; }
    .recipe-details { padding: 0 14px 14px 14px; border-top: 1px solid #eee; }
    .recipe-details.hidden { display: none; }
    .recipe-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 10px; }
    .recipe-actions { display: flex; gap: 8px; }
    .recipe-card h3 { margin: 0 0 6px 0; font-size: 16px; }
    .recipe-meta { font-size: 13px; color: #666; margin-bottom: 8px; }
    .tag { display: inline-block; background: #f0f0f0; border-radius: 3px; padding: 2px 8px; font-size: 12px; margin-right: 4px; }
    .ingredient-list { font-size: 13px; color: #444; margin: 6px 0 0 0; padding-left: 16px; }
    .edit-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: #555; margin-top: 0; white-space: nowrap; }
    .edit-btn:hover { background: #f5f5f5; }
    .delete-btn { background: none; border: 1px solid #e4b0b0; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: #a33; margin-top: 0; white-space: nowrap; }
    .delete-btn:hover { background: #fff1f1; }

    #add-recipe-btn { background: #222; color: white; border: none; border-radius: 4px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-bottom: 20px; margin-top: 0; }
    #recipes-loading { color: #666; font-size: 14px; }

    /* Recipe form */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .form-group input[type="text"],
    .form-group input[type="number"] { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tags label { font-weight: normal; display: flex; align-items: center; gap: 4px; font-size: 14px; }
    .new-tag-row { display: flex; gap: 8px; margin-top: 10px; }
    .new-tag-row input { flex: 1; }
    .new-tag-row button { margin-top: 0; padding: 8px 12px; font-size: 13px; }

    .ingredient-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .ingredient-row input { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    .ingredient-row button { padding: 6px 10px; font-size: 18px; margin-top: 0; background: none; border: none; cursor: pointer; color: #999; }

    #add-ingredient-btn { background: none; border: 1px dashed #aaa; color: #555; padding: 6px 14px; border-radius: 4px; cursor: pointer; margin-top: 0; font-size: 13px; }
    #save-btn { background: #222; color: white; border: none; border-radius: 4px; padding: 10px 24px; font-size: 15px; cursor: pointer; margin-top: 10px; }
    #cancel-btn { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 10px 24px; font-size: 15px; cursor: pointer; margin-top: 10px; margin-left: 8px; }

    #recipe-success { color: green; margin-top: 12px; display: none; }
    #recipe-error { color: red; margin-top: 12px; }
  </style>
</head>
<body>

  <h1>🍽 Planificador de comidas</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('planner', this)">Plan semanal</button>
    <button class="tab" onclick="showTab('recipes', this)">Recetas</button>
  </div>

  <!-- Planner Tab -->
  <div id="tab-planner" class="panel active">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">Semana anterior</button>
      <button onclick="goToThisWeek()">Esta semana</button>
      <button onclick="changeWeek(1)">Semana siguiente</button>
      <span id="selected-week-label"></span>
    </div>
    <p id="week-state"></p>
    <button id="generate-plan-btn" onclick="generatePlan()">Generar plan para esta semana</button>
    <div id="loading" style="display:none">Pensando...</div>
    <div id="error"></div>
    <div id="meal-plan-empty" style="display:none"></div>
    <div id="meal-plan"></div>
  </div>

  <!-- Recipes Tab -->
  <div id="tab-recipes" class="panel">

    <!-- List view -->
    <div id="recipes-list-view">
      <button id="add-recipe-btn" onclick="showForm()">+ Añadir receta</button>
      <div id="recipes-loading">Cargando recetas...</div>
      <div id="recipes-container"></div>
    </div>

    <!-- Add / Edit recipe form (hidden by default) -->
    <div id="recipes-form-view" style="display:none">
      <h2 id="form-title">Añadir una receta</h2>

      <div class="form-group">
        <label>Nombre de la receta</label>
        <input type="text" id="recipe-name" placeholder="p. ej., salmón con verduras asadas">
      </div>

      <div class="form-group">
        <label>Etiquetas</label>
        <div class="tags" id="tags-container">Cargando etiquetas...</div>
        <div class="new-tag-row">
          <input type="text" id="new-tag-input" placeholder="Nueva etiqueta (p. ej., horno)">
          <button type="button" onclick="addTagOption()">Añadir etiqueta</button>
        </div>
      </div>

      <div class="form-group">
        <label>Tiempo de preparación (minutos)</label>
        <input type="number" id="prep-minutes" placeholder="p. ej., 30" style="width:120px">
      </div>

      <div class="form-group">
        <label>Ingredientes</label>
        <div id="ingredients-list"></div>
        <button id="add-ingredient-btn" onclick="addIngredient()">+ Añadir ingrediente</button>
      </div>

      <button id="save-btn" onclick="saveRecipe()">Guardar receta</button>
      <button id="cancel-btn" onclick="hideForm()">Cancelar</button>
      <div id="recipe-success">✅ ¡Receta guardada!</div>
      <div id="recipe-error"></div>
    </div>

  </div>

  <script>

    let currentEditId = null; // null = adding, number = editing
    let currentTagOptions = [];
    let currentPlan = null;
    let plannerRecipes = [];
    let selectedWeekStart = null;

    const PRODUCTION_BACKEND_BASE_URL = 'https://meal-planner-igpk.onrender.com';
    const BACKEND_BASE_URL = ['localhost', '127.0.0.1'].includes(window.location.hostname)
      ? 'http://127.0.0.1:8000'
      : PRODUCTION_BACKEND_BASE_URL;

    function apiUrl(path) {
      return `${BACKEND_BASE_URL}${path}`;
    }


    // ── Tabs ──────────────────────────────────────────────────────
    function showTab(name, el) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      el.classList.add('active');
      if (name === 'recipes') loadRecipes();
    }

    // ── Meal planner ──────────────────────────────────────────────
    const PLAN_DAYS = ['monday', 'tuesday', 'wednesday', 'thursday'];
    const DAY_LABELS = {
      monday: 'Lunes',
      tuesday: 'Martes',
      wednesday: 'Miércoles',
      thursday: 'Jueves'
    };

    function toIsoDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function parseIsoDate(isoDate) {
      return new Date(`${isoDate}T00:00:00Z`);
    }

    function addDays(date, days) {
      const nextDate = new Date(date);
      nextDate.setUTCDate(nextDate.getUTCDate() + days);
      return nextDate;
    }

    function getWeekStartIsoDate(baseDate = new Date()) {
      const date = new Date(Date.UTC(baseDate.getUTCFullYear(), baseDate.getUTCMonth(), baseDate.getUTCDate()));
      const day = date.getUTCDay();
      return toIsoDate(addDays(date, -day));
    }

    function getWeekContextLabel(isoDate) {
      const thisWeek = getWeekStartIsoDate();
      const nextWeek = toIsoDate(addDays(parseIsoDate(thisWeek), 7));

      if (isoDate === thisWeek) return 'Esta semana';
      if (isoDate === nextWeek) return 'Semana siguiente';
      return 'Otra semana';
    }

    function getPlanFromPayload(payload) {
      return PLAN_DAYS.reduce((plan, day) => {
        plan[day] = payload?.[day] || '';
        return plan;
      }, {});
    }

    function updateWeekContextUi() {
      const weekLabel = document.getElementById('selected-week-label');
      const generateButton = document.getElementById('generate-plan-btn');
      weekLabel.textContent = `Semana de ${selectedWeekStart} (${getWeekContextLabel(selectedWeekStart)})`;
      generateButton.textContent = `Generar plan para la semana de ${selectedWeekStart}`;
    }

    async function loadSelectedWeekPlan() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const planDiv = document.getElementById('meal-plan');
      const emptyState = document.getElementById('meal-plan-empty');
      const weekState = document.getElementById('week-state');

      loading.style.display = 'block';
      error.textContent = '';
      emptyState.style.display = 'none';
      planDiv.innerHTML = '';
      currentPlan = null;

      try {
        plannerRecipes = await fetchPlannerRecipes();

        const response = await fetch(apiUrl(`/meal-plans?date=${selectedWeekStart}`));
        if (response.status === 404) {
          weekState.textContent = `No hay un plan guardado para la semana de ${selectedWeekStart}.`;
          emptyState.textContent = 'Todavía no existe un plan para esta semana. Pulsa "Generar plan" para crearlo.';
          emptyState.style.display = 'block';
          return;
        }

        if (!response.ok) throw new Error('No se pudo recuperar el plan semanal');

        const storedPlan = await response.json();
        currentPlan = getPlanFromPayload(storedPlan);
        weekState.textContent = `Mostrando el plan guardado para la semana de ${selectedWeekStart}.`;
        renderMealPlan();
      } catch (err) {
        error.textContent = 'No se pudo cargar el plan semanal: ' + err.message;
      } finally {
        loading.style.display = 'none';
      }
    }

    async function generatePlan() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const emptyState = document.getElementById('meal-plan-empty');
      const weekState = document.getElementById('week-state');

      loading.style.display = 'block';
      error.textContent = '';

      try {
        const response = await fetch(apiUrl('/meal-plans/generate'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: selectedWeekStart })
        });

        if (!response.ok) throw new Error('No se pudo generar el plan semanal');

        const savedPlan = await response.json();
        currentPlan = getPlanFromPayload(savedPlan);
        emptyState.style.display = 'none';
        weekState.textContent = `Plan generado y guardado para la semana de ${selectedWeekStart}.`;
        if (plannerRecipes.length === 0) plannerRecipes = await fetchPlannerRecipes();
        renderMealPlan();
      } catch (err) {
        error.textContent = 'Algo salió mal: ' + err.message;
      } finally {
        loading.style.display = 'none';
      }
    }

    function changeWeek(offsetInWeeks) {
      selectedWeekStart = toIsoDate(addDays(parseIsoDate(selectedWeekStart), offsetInWeeks * 7));
      updateWeekContextUi();
      loadSelectedWeekPlan();
    }

    function goToThisWeek() {
      selectedWeekStart = getWeekStartIsoDate();
      updateWeekContextUi();
      loadSelectedWeekPlan();
    }


    async function fetchPlannerRecipes() {
      const response = await fetch(apiUrl('/recipes'));
      const recipes = await response.json();
      return recipes.map(r => r.name).sort((a, b) => a.localeCompare(b));
    }

    function renderMealPlan() {
      const planDiv = document.getElementById('meal-plan');
      if (!currentPlan) return;

      planDiv.innerHTML = `<h2>Plan de la semana de ${selectedWeekStart}:</h2>` +
        PLAN_DAYS.map(day => `
          <div class="day">
            <div class="day-header">
              <div>
                <strong>${DAY_LABELS[day]}:</strong>
                <span id="meal-name-${day}">${escapeHtml(currentPlan[day] || '')}</span>
              </div>
              <div class="day-actions">
                <button class="day-action-btn" onclick="toggleManualChange('${day}')">Cambiar</button>
                <button class="day-action-btn" onclick="regenerateDay('${day}')">Regenerar</button>
              </div>
            </div>
            <div class="day-manual-row" id="manual-row-${day}">
              <select id="manual-select-${day}">
                ${buildRecipeOptions(currentPlan[day])}
              </select>
              <button class="day-action-btn" onclick="applyManualChange('${day}')">Guardar</button>
            </div>
          </div>
        `).join('');
    }

    function buildRecipeOptions(selectedRecipe) {
      return plannerRecipes
        .map(name => {
          const selected = name === selectedRecipe ? 'selected' : '';
          return `<option value="${escapeHtml(name)}" ${selected}>${escapeHtml(name)}</option>`;
        })
        .join('');
    }

    function toggleManualChange(day) {
      const row = document.getElementById(`manual-row-${day}`);
      const select = document.getElementById(`manual-select-${day}`);
      select.innerHTML = buildRecipeOptions(currentPlan[day]);
      row.classList.toggle('visible');
    }

    function applyManualChange(day) {
      const select = document.getElementById(`manual-select-${day}`);
      const selectedRecipe = select.value;
      if (!selectedRecipe) return;

      currentPlan[day] = selectedRecipe;
      updateDayInUi(day);
      document.getElementById(`manual-row-${day}`).classList.remove('visible');
    }

    async function regenerateDay(day) {
      const error = document.getElementById('error');
      error.textContent = '';

      try {
        const usedRecipes = PLAN_DAYS
          .filter(d => d !== day)
          .map(d => currentPlan[d])
          .filter(Boolean);

        const response = await fetch(apiUrl('/generate-day-replacement'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            day,
            current_recipe: currentPlan[day],
            used_recipes: usedRecipes
          })
        });

        if (!response.ok) throw new Error('No se pudo regenerar la comida');

        const data = await response.json();
        currentPlan[day] = data.recipe;
        updateDayInUi(day);
      } catch (err) {
        error.textContent = 'No se pudo regenerar el día: ' + err.message;
      }
    }

    function updateDayInUi(day) {
      const mealName = document.getElementById(`meal-name-${day}`);
      if (mealName) mealName.textContent = currentPlan[day] || '';

      const select = document.getElementById(`manual-select-${day}`);
      if (select) select.innerHTML = buildRecipeOptions(currentPlan[day]);
    }

    // ── Recipe list ───────────────────────────────────────────────
    async function loadRecipes() {
      const container = document.getElementById('recipes-container');
      const loadingEl = document.getElementById('recipes-loading');

      loadingEl.style.display = 'block';
      container.innerHTML = '';

      try {
        const res = await fetch(apiUrl('/recipes'));
        const recipes = await res.json();
        recipes.sort((a, b) => a.name.localeCompare(b.name));

        loadingEl.style.display = 'none';

        if (recipes.length === 0) {
          container.innerHTML = '<p style="color:#888">Aún no hay recetas. ¡Añade una!</p>';
          return;
        }

        container.innerHTML = recipes.map(r => {
          const tags = (r.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          const prep = r.prep_minutes ? `${r.prep_minutes} min` : 'Tiempo de preparación no definido';
          const ingredients = (r.recipe_ingredients || [])
            .map(i => `<li>${i.ingredients.name} — ${i.quantity}</li>`)
            .join('');

          return `
            <div class="recipe-card" data-recipe-id="${r.id}">
              <button class="recipe-name-btn" onclick="toggleRecipeDetails(${r.id})">${r.name}</button>
              <div class="recipe-details hidden" id="recipe-details-${r.id}">
              <div class="recipe-card-header">
                <h3>${r.name}</h3>
                <div class="recipe-actions">
                  <button class="edit-btn" onclick="editRecipe(${r.id})">Editar</button>
                  <button class="delete-btn" onclick="deleteRecipe(${r.id})">Eliminar</button>
                </div>
              </div>
              <div class="recipe-meta">${prep} &nbsp;|&nbsp; ${tags || 'sin etiquetas'}</div>
              ${ingredients ? `<ul class="ingredient-list">${ingredients}</ul>` : ''}
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        loadingEl.style.display = 'none';
        container.innerHTML = `<p style="color:red">No se pudieron cargar las recetas: ${err.message}</p>`;
      }
    }

    function toggleRecipeDetails(id) {
      const detailEls = document.querySelectorAll('.recipe-details');
      const selected = document.getElementById(`recipe-details-${id}`);
      const shouldOpen = selected.classList.contains('hidden');

      detailEls.forEach(el => el.classList.add('hidden'));
      if (shouldOpen) selected.classList.remove('hidden');
    }

    // ── Show/hide form ────────────────────────────────────────────
    async function showForm() {
      currentEditId = null;
      document.getElementById('form-title').textContent = 'Añadir una receta';
      document.getElementById('recipe-name').value = '';
      document.getElementById('prep-minutes').value = '';
      document.getElementById('new-tag-input').value = '';
      document.getElementById('recipe-error').textContent = '';
      document.getElementById('recipe-success').style.display = 'none';
      resetIngredients();
      await loadTags();
      document.getElementById('recipes-list-view').style.display = 'none';
      document.getElementById('recipes-form-view').style.display = 'block';
    }

    async function editRecipe(id) {
      currentEditId = id;
      document.getElementById('form-title').textContent = 'Editar receta';
      document.getElementById('recipe-error').textContent = '';
      document.getElementById('recipe-success').style.display = 'none';
      document.getElementById('new-tag-input').value = '';

      // Load tags first, then populate
      await loadTags();

      const res = await fetch(apiUrl(`/recipes/${id}`));
      const recipe = await res.json();

      document.getElementById('recipe-name').value = recipe.name;
      document.getElementById('prep-minutes').value = recipe.prep_minutes || '';

      (recipe.tags || []).forEach(tag => ensureTagOption(tag));
      renderTagOptions(recipe.tags || []);

      // Populate ingredients
      document.getElementById('ingredients-list').innerHTML = '';
      (recipe.recipe_ingredients || []).forEach(i => {
        addIngredient(i.ingredients.name, i.quantity);
      });
      if (!recipe.recipe_ingredients || recipe.recipe_ingredients.length === 0) {
        addIngredient();
      }

      document.getElementById('recipes-list-view').style.display = 'none';
      document.getElementById('recipes-form-view').style.display = 'block';
    }

    function hideForm() {
      document.getElementById('recipes-form-view').style.display = 'none';
      document.getElementById('recipes-list-view').style.display = 'block';
    }

    function resetIngredients() {
      document.getElementById('ingredients-list').innerHTML = '';
      addIngredient();
    }

    // ── Ingredients ───────────────────────────────────────────────
    function addIngredient(name = '', quantity = '') {
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.innerHTML = `
        <input type="text" placeholder="Nombre del ingrediente (p. ej., ajo)" value="${name}">
        <input type="text" placeholder="Cantidad (p. ej., 2 dientes)" value="${quantity}">
        <button onclick="removeIngredient(this)">×</button>
      `;
      document.getElementById('ingredients-list').appendChild(row);
    }

    function removeIngredient(btn) {
      const rows = document.querySelectorAll('.ingredient-row');
      if (rows.length > 1) btn.parentElement.remove();
    }

    // ── Save (create or update) recipe ────────────────────────────
    async function saveRecipe() {
      const name = document.getElementById('recipe-name').value.trim();
      const prepRaw = document.getElementById('prep-minutes').value;
      const tags = [...document.querySelectorAll('#tags-container input:checked')].map(cb => cb.value);

      const ingredientRows = document.querySelectorAll('.ingredient-row');
      const ingredients = [...ingredientRows].map(row => {
        const inputs = row.querySelectorAll('input');
        return { name: inputs[0].value.trim(), quantity: inputs[1].value.trim() };
      }).filter(i => i.name !== '');

      const errorDiv = document.getElementById('recipe-error');
      const successDiv = document.getElementById('recipe-success');
      errorDiv.textContent = '';
      successDiv.style.display = 'none';

      if (!name) { errorDiv.textContent = 'Por favor, introduce un nombre de receta.'; return; }
      if (ingredients.length === 0) { errorDiv.textContent = 'Por favor, añade al menos un ingrediente.'; return; }

      const payload = {
        name, tags,
        prep_minutes: prepRaw ? parseInt(prepRaw) : null,
        ingredients
      };

      try {
        const url = currentEditId
          ? apiUrl(`/recipes/${currentEditId}`)
          : apiUrl('/recipes');
        const method = currentEditId ? 'PUT' : 'POST';

        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('Error del servidor');

        successDiv.style.display = 'block';
        setTimeout(() => {
          successDiv.style.display = 'none';
          hideForm();
          loadRecipes();
        }, 1500);

      } catch (err) {
        errorDiv.textContent = 'No se pudo guardar la receta: ' + err.message;
      }
    }

    async function deleteRecipe(id) {
      if (!window.confirm('¿Eliminar esta receta? Esta acción no se puede deshacer.')) return;

      try {
        const response = await fetch(apiUrl(`/recipes/${id}`), { method: 'DELETE' });
        if (!response.ok) throw new Error('Error del servidor');
        loadRecipes();
      } catch (err) {
        window.alert('No se pudo eliminar la receta: ' + err.message);
      }
    }

    // ── Load tags ─────────────────────────────────────────────────
    async function loadTags() {
      const res = await fetch(apiUrl('/tags'));
      currentTagOptions = await res.json();
      renderTagOptions();
    }

    function addTagOption() {
      const input = document.getElementById('new-tag-input');
      const newTag = input.value.trim().toLowerCase();
      if (!newTag) return;

      ensureTagOption(newTag);
      renderTagOptions([newTag]);
      input.value = '';
    }

    function ensureTagOption(tag) {
      if (!currentTagOptions.includes(tag)) {
        currentTagOptions.push(tag);
      }
    }

    function renderTagOptions(selectedTags = []) {
      const selected = new Set(selectedTags);
      const sortedTags = [...currentTagOptions].sort((a, b) => a.localeCompare(b));
      document.getElementById('tags-container').innerHTML = sortedTags.map(tag => {
        const checked = selected.has(tag) ? 'checked' : '';
        return `<label><input type="checkbox" value="${escapeHtml(tag)}" ${checked}> ${escapeHtml(tag.charAt(0).toUpperCase() + tag.slice(1))}</label>`;
      }).join('');
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    selectedWeekStart = getWeekStartIsoDate();
    updateWeekContextUi();
    loadSelectedWeekPlan();

  </script>

</body>
</html>
