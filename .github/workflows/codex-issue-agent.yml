name: Codex Issue Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex_issue_agent:
    if: contains(github.event.comment.body, '@repo-agent')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create branch name
        run: |
          BRANCH="codex/issue-${{ github.event.issue.number }}-${{ github.run_id }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          pip install pytest

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are working in the GitHub Actions checkout of this repository.

            Read AGENTS.md first and follow agent-playbook.md.
            Base branch is main.
            Create the smallest safe change needed for GitHub issue #${{ github.event.issue.number }}.
            Add or update tests.
            Do not overengineer.
            Do not make unrelated refactors.

            Issue title:
            ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

      - name: Run tests
        run: |
          cd backend
          pytest test_main.py

      - name: Commit changes
        run: |
          git config user.name "codex-agent"
          git config user.email "codex-agent@users.noreply.github.com"
          git add .
          git commit -m "Implement issue #${{ github.event.issue.number }}" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push -u origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Implement issue #${{ github.event.issue.number }}" \
            --body "Automated Codex PR for #${{ github.event.issue.number }}"
